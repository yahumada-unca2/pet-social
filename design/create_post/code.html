<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Post - Pet Social</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#f53d3d",
          "background-light": "#f8f5f5",
          "background-dark": "#221010",
        },
        fontFamily: {
          "display": ["Spline Sans"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  body { font-family: 'Spline Sans', sans-serif; }
</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gray-100 flex justify-center min-h-screen">
<div class="relative flex h-[884px] w-full max-w-[480px] flex-col bg-background-light group/design-root overflow-x-hidden shadow-2xl">
<!-- Top Bar -->
<div class="flex items-center p-4 pb-2 justify-between shrink-0">
<button class="text-gray-800 flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-gray-200 transition-colors">
<span class="material-symbols-outlined" style="font-size: 28px;">close</span>
</button>
<h2 class="text-gray-900 text-xl font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">New Post</h2>
</div>
<!-- Main Content Area -->
<div class="flex flex-col flex-1 p-4 overflow-y-auto">
<!-- Image Placeholder (Top 60% conceptually) -->
<button class="w-full aspect-[4/5] sm:aspect-square md:aspect-[4/5] flex flex-col items-center justify-center gap-4 rounded-xl border-[3px] border-dashed border-gray-300 bg-white/50 hover:bg-white transition-colors group">
<div class="p-4 rounded-full bg-gray-100 group-hover:bg-primary/10 transition-colors text-gray-400 group-hover:text-primary">
<span class="material-symbols-outlined" style="font-size: 48px; font-variation-settings: 'FILL' 1;">add_a_photo</span>
</div>
<p class="text-gray-500 text-lg font-bold leading-tight tracking-tight">Tap to select a photo</p>
</button>
<!-- Caption Input (Bottom 40% conceptually) -->
<div class="mt-6 flex-1 flex flex-col">
<textarea class="w-full flex-1 resize-none bg-transparent border-none p-2 text-xl font-medium text-gray-800 placeholder-gray-400 focus:ring-0 focus:outline-none" placeholder="What's on your furry friend's mind?"></textarea>
</div>
</div>
<!-- Fixed Bottom Bar -->
<div class="p-4 pb-8 bg-gradient-to-t from-background-light via-background-light to-transparent shrink-0">
<button class="w-full bg-primary text-white text-xl font-bold py-4 rounded-full shadow-[0_8px_24px_rgba(245,61,61,0.25)] hover:shadow-[0_4px_12px_rgba(245,61,61,0.3)] active:translate-y-1 transition-all">
        Publish
      </button>
</div>
</div>
</body></html>
